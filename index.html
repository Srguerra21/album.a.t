<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Álbum Gótico Romântico</title>

<link rel="stylesheet" href="css/sytle.css">

</head>


<body>


<div class="page-ornament top-left"></div>
<div class="page-ornament top-right"></div>
<div class="page-ornament bottom-left"></div>
<div class="page-ornament bottom-right"></div>



<header class="hero">

<div class="hero-frame">

<p class="hero-kicker">
Memórias eternizadas
</p>


<h1>
Nosso Álbum
</h1>


<div class="divider"></div>


<p class="subtitle">

Entre pétalas secas, promessas sussurradas e sombras delicadas,
este espaço guarda lembranças, imagens e canções que resistem ao tempo.

</p>


</div>

</header>





<main class="container">



<section class="section ornate-panel">


<h2>
Adicionar Foto
</h2>



<form id="photoForm" class="form-grid">


<div class="field">


<label>
Escolher imagem
</label>


<input 
type="file"
id="photoFile"
accept="image/*"
required
>


</div>



<div class="field">


<label>
Descrição da memória
</label>


<textarea

id="photoDescription"

rows="4"

placeholder="Descreva a lembrança..."

required>

</textarea>


</div>



<button class="btn">

Adicionar ao Álbum

</button>


</form>


</section>






<section class="section ornate-panel">


<h2>
Álbum
</h2>


<div 
id="albumGrid"
class="album-grid">

</div>


</section>







<section class="section ornate-panel">


<h2>
Adicionar Música
</h2>



<form id="musicForm" class="form-grid">



<div class="field">

<label>
Título da música
</label>


<input

id="musicTitle"

type="text"

required>

</div>




<div class="field">


<label>
Link YouTube
</label>


<input

id="musicLink"

type="url"

required>


</div>



<button class="btn">

Adicionar Música

</button>


</form>


</section>






<section class="section ornate-panel">


<h2>
Trilha Sonora
</h2>



<div

id="soundtrackList"

class="soundtrack-list">


</div>



</section>






</main>





<script type="module" src="js/script.js"></script>


</body>


</html>
